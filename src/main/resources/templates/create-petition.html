<!DOCTYPE html>
<html>
<head>
    <title>Create a Petition</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
        input, textarea { width: 100%; padding: 8px; margin: 10px 0; }
        button { background: green; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Create Oksanas New Petition</h1>
    <form action="/petitions/create" method="post">
        <label>Title:</label>
        <input type="text" name="title" required/>
        <label>Description:</label>
        <textarea name="description" rows="5" required></textarea>
        <button type="submit">Create Petition</button>
    </form>
</body>
</html>
